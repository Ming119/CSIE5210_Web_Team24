<!DOCTYPE html>

<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Modern Website Template</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- Navigation Bar -->
	<nav class="navbar">
		<div class="logo">Logo</div>
		<ul class="nav-links">
			<li><a href="#home">Home</a></li>
			<li><a href="#about">About</a></li>
			<li><a href="#services">Services</a></li>
			<li><a href="#contact">Contact</a></li>
		</ul>
		<div class="menu-toggle">☰</div>
	</nav>

	<!-- Hero Section -->
	<section id="home" class="hero">
		<div class="hero-content">
			<h1>Welcome to Our Website</h1>
			<p>A modern and responsive design for all your needs.</p>
			<button class="cta-button">Get Started</button>
		</div>
	</section>

	<!-- About Section -->
	<section id="about" class="section">
		<h2>About Us</h2>
		<p>We are a team dedicated to creating amazing web experiences.</p>
	</section>

	<!-- Services Section -->
	<section id="services" class="section">
		<h2>Our Services</h2>
		<div class="services-container">
			<div class="service-card">Service 1</div>
			<div class="service-card">Service 2</div>
			<div class="service-card">Service 3</div>
		</div>
	</section>

	<!-- Footer -->
	<footer class="footer">
		<p>&copy; 2025 Modern Website. All rights reserved.</p>
	</footer>

	<script src="script.js"></script>
</body>
</html>
